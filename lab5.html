<!DOCTYPE html>
<html>
<head>
<title>Registration Page</title>
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</head>
<body>
 <div class="container">
  <h3>Create a Walmart account</h3>
  <form action=javascript:submitForm()>
   <div class="row">
    <div class="form-group col form-inline>
     <label for="firstName">First Name</label>
     <input type="text" class="form-control form-control-md" name="First Name" id="firstName" placeholder="Enter first name" required>
    </div>
    <div class="form-group col form-inline>
     <label for="lastName">Last Name</label>
     <input type="text" class="form-control form-control-md" name="Last Name" id="lastName" placeholder="Enter last name" required>
    </div>
   </div>
   <div class="row">
    <div class="form-group col form-inline>
     <label for="email">Email</label>
     <input type="text" class="form-control form-control-md" name="Email" id="email" pattern="[^@]+@[^@]+\.[^@]+" placeholder="Enter email address" required>
    </div>
   </div>
   <div class="row">
    <div class="form-group col form-inline>
     <label for="dateOfBirth">Date of Birth</label>
     <input type="date" class="form-control form-control-md" id="dateOfBirth" required>
    </div>
    <div class="form-group col form-inline>
     <label for="password">Password</label>
     <input type="password" class="form-control form-control-md" name="Password" id="password" pattern="(?=.*[?!]).*" placeholder="Choose a password" required>
     <p>Password must contain ! or ?</p>
    </div>
   </div>
   <button type="submit" onclick="return val()">Submit</button>
  </form>
 </div>
 <script>
  function submitForm(){
   const user={
    firstName:document.getElementById("firstName").value,
    lastName:document.getElementById("lastName").value,
    email:document.getElementById("email").value,
    dateOfBirth:document.getElementById("dateOfBirth").value,
    password:document.getElementById("password").value,
   };
   document.writeln('<span style="font-family:Arial"><h1>Registration Successful!</h1><h2>User information:</h2><h3>First Name: '+user.firstName+'</h3><h3>Last Name: '+user.lastName+'</h3><h3>Email: '+user.email+'</h3><h3>Date of Birth: '+user.dateOfBirth+'</h3><h3>Password: '+'*'.repeat(user.password.length)+'</h3></span>');
  }
 </script>
</body>
</html>
